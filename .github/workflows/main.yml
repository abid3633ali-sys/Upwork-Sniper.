name: Upwork-Sniper-8min
on:
  schedule:
    - cron: '*/8 * * * *'
  workflow_dispatch:

jobs:
  run-sniper:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install feedparser requests
      - name: Run Sniper
        run: python main.py
      - name: Save Progress
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          touch last_job.txt
          git add last_job.txt
          git commit -m "Update last job ID" || exit 0
          git push
