name: Upwork-Sniper-8min

on:
  schedule:
    - cron: '*/8 * * * *' # يعمل كل 8 دقائق تلقائياً
  workflow_dispatch: # يسمح لك بتشغيله يدوياً

jobs:
  run-sniper:
    runs-on: ubuntu-latest
    permissions:
      contents: write # إذن ضروري للكتابة في ملف الذاكرة
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # نسخة حديثة ومستقرة

      - name: Set up Python
        uses: actions/setup-python@v5 # نسخة حديثة ومستقرة
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser requests

      - name: Run Sniper
        run: python main.py
