name: Upwork-Sniper-8min

on:
  schedule:
    - cron: '*/8 * * * *'
  workflow_dispatch:

jobs:
  run-sniper:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # نسخة v4 موثقة بالكامل

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fbb58469 # نسخة v5 موثقة بالكامل
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install feedparser requests

      - name: Run Sniper
        run: python main.py
